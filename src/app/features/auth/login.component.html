<div class="login-page-container">
  <!-- From Uiverse.io by mamyapro123 --> 
  <div class="doodle-wrapper">
    <input
      type="checkbox"
      id="doodle-flip"
      class="doodle-toggle"
      aria-label="Toggle Login and Sign up"
    />

    <div class="doodle-header">
      <span class="doodle-mode-text login-text">Log in</span>
      <label class="doodle-switch-label" for="doodle-flip" tabindex="0">
        <span class="doodle-switch-handle"></span>
      </label>
      <span class="doodle-mode-text signup-text">Sign up</span>
    </div>

    <div class="doodle-card-scene">
      <svg
        class="doodle-svg doodle-star"
        viewBox="0 0 24 24"
        fill="#ffd166"
        stroke="var(--ink)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
        ></polygon>
      </svg>
      <svg
        class="doodle-svg doodle-sparkle"
        viewBox="0 0 24 24"
        fill="#06d6a0"
        stroke="var(--ink)"
        stroke-width="1.5"
      >
        <path
          d="M12 2 Q12 12 22 12 Q12 12 12 22 Q12 12 2 12 Q12 12 12 2 Z"
        ></path>
      </svg>
      <svg
        class="doodle-svg doodle-swirl"
        viewBox="0 0 24 24"
        fill="none"
        stroke="var(--ink)"
        stroke-width="1.5"
        stroke-linecap="round"
      >
        <path
          d="M3 12 C 3 5 10 5 16 5 C 20 5 21 9 18 12 C 15 15 10 13 12 9 C 14 5 22 9 21 16"
        ></path>
      </svg>

      <div class="doodle-card-inner">
        <div class="doodle-card-front">
          <div class="doodle-title">Welcome!</div>
          <form class="doodle-form" [formGroup]="loginForm" (ngSubmit)="onSubmitLogin()">
            <div class="doodle-input-wrapper">
              <input
                class="doodle-input"
                formControlName="email"
                placeholder="Email"
                type="email"
                required
              />
            </div>
            <div class="doodle-input-wrapper">
              <input
                class="doodle-input"
                formControlName="password"
                placeholder="Password"
                type="password"
                required
              />
            </div>
            <div class="error" *ngIf="loginErrorMessage" style="color: #f44336; font-size: 0.9rem; text-align: center;">
              {{ loginErrorMessage }}
            </div>
            <button class="doodle-btn" type="submit" [disabled]="loginForm.invalid">Let's Go!</button>
          </form>
        </div>

        <div class="doodle-card-back">
          <div class="doodle-title doodle-title-alt">Join Us!</div>
          <form class="doodle-form" [formGroup]="signupForm" (ngSubmit)="onSubmitSignup()">
            <div class="doodle-input-wrapper">
              <input
                class="doodle-input"
                formControlName="username"
                placeholder="Name"
                type="text"
                required
              />
            </div>
            <div class="doodle-input-wrapper">
              <input
                class="doodle-input"
                formControlName="email"
                placeholder="Email"
                type="email"
                required
              />
            </div>
            <div class="doodle-input-wrapper">
              <input
                class="doodle-input"
                formControlName="password"
                placeholder="Password"
                type="password"
                required
              />
            </div>
            <div class="error" *ngIf="signupErrorMessage" style="color: #f44336; font-size: 0.9rem; text-align: center;">
              {{ signupErrorMessage }}
            </div>
            <button class="doodle-btn doodle-btn-alt" type="submit" [disabled]="signupForm.invalid">Confirm!</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
